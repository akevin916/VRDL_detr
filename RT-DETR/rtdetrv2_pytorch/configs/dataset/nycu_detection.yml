task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

# NYCU digit detection: 10 classes (digits 0-9)
num_classes: 10
remap_mscoco_category: False


train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: ../data/nycu-hw2-data/train
    ann_file: ../data/nycu-hw2-data/train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction


val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: ../data/nycu-hw2-data/valid
    ann_file: ../data/nycu-hw2-data/valid.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
